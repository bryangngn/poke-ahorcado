<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéWordle Experto</title>
    <style>
        :root {
            --color-correct: #538d4e;
            --color-present: #b59f3b; /* Amarillo/Naranja de Wordle */
            --color-absent: #3a3a3c;
            --color-tile-border: #3a3a3c;
            --bg-color: #121213;
            --text-color: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
            min-height: 100vh;
            text-transform: uppercase;
        }

        header {
            border-bottom: 1px solid var(--color-tile-border);
            width: 100%;
            text-align: center;
            padding: 10px 0;
            margin-bottom: 15px;
        }

        h1 { margin: 0; letter-spacing: 1px; font-size: 1.5rem; }

        #word-grid {
            display: flex;
            gap: 5px;
            margin: 15px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tile {
            width: 42px;
            height: 42px;
            border: 2px solid var(--color-tile-border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            transition: all 0.4s ease;
            background-color: transparent;
        }

        .tile.correct {
            background-color: var(--color-correct);
            border-color: var(--color-correct);
        }

        .tile.present {
            border-color: var(--color-present);
            box-shadow: inset 0 0 10px var(--color-present);
            /* No revelamos la letra, solo marcamos el borde/brillo */
        }

        .tile.present-active {
            background-color: var(--color-present);
            border-color: var(--color-present);
        }

        /* Pistas y Controles */
        .hints-container { display: flex; gap: 8px; margin-bottom: 10px; }
        .btn-hint {
            background: #272729;
            border: 1px solid #565758;
            color: #d7dadc;
            padding: 8px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.7rem;
        }

        #hint-text { color: #aaa; font-size: 0.8rem; height: 1.2rem; margin-bottom: 15px; text-transform: none; }

        .input-section { display: flex; flex-direction: column; align-items: center; gap: 12px; }
        #letter-input {
            background: transparent;
            border: 2px solid #565758;
            color: white;
            font-size: 1.8rem;
            width: 50px;
            padding: 10px;
            text-align: center;
            border-radius: 4px;
            outline: none;
        }

        .btn-main {
            background-color: #818384;
            color: white;
            border: none;
            padding: 15px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }

        .btn-surrender { background-color: #a33333; }

        .discarded-area { margin-top: 25px; width: 100%; max-width: 400px; text-align: center; }
        #letters-box { display: flex; flex-wrap: wrap; justify-content: center; gap: 5px; margin-top: 10px; }
        .key-absent {
            background-color: var(--color-absent);
            width: 32px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* Modal */
        #modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 10; }
        #result-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1e1e1f; padding: 20px; border-radius: 10px; z-index: 11; width: 85%; max-width: 350px; text-align: center;
        }
        #result-modal img { width: 140px; margin: 10px 0; }
        #result-modal p { text-transform: none; color: #ccc; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header><h1>POKÉWORDLE</h1></header>

    <div class="hints-container">
        <button class="btn-hint" onclick="getHint('region')">Pista: Región</button>
        <button class="btn-hint" onclick="getHint('type')">Pista: Tipo</button>
    </div>
    <div id="hint-text"></div>

    <div id="word-grid"></div>

    <div class="input-section">
        <input type="text" id="letter-input" maxlength="1" inputmode="text" autocomplete="off">
        <div style="display: flex; gap: 10px;">
            <button class="btn-main" onclick="checkLetter()">ADIVINAR</button>
            <button class="btn-main btn-surrender" onclick="endGame(true)">RENDIRSE</button>
        </div>
    </div>

    <div class="discarded-area">
        <div style="font-size: 0.7rem; color: #565758; letter-spacing: 1px;">LETRAS DESCARTADAS</div>
        <div id="letters-box"></div>
    </div>

    <div id="modal-overlay"></div>
    <div id="result-modal">
        <h2 id="modal-title"></h2>
        <img id="poke-img" src="" alt="">
        <h3 id="poke-name" style="color: var(--color-correct);"></h3>
        <p id="poke-desc"></p>
        <button class="btn-main" onclick="startNewGame()" style="background-color: var(--color-correct); width: 100%; margin-top: 15px;">VOLVER A JUGAR</button>
    </div>

    <script>
        let targetName = "";
        let revealedLetters = []; 
        let presentLetters = new Set(); // Letras que están pero no en esa posición
        let wrongLetters = [];
        let pokemonData = null;

        const typeTranslations = {
            normal: "Normal", fighting: "Lucha", flying: "Volador", poison: "Veneno", ground: "Tierra", 
            rock: "Roca", bug: "Bicho", ghost: "Fantasma", steel: "Acero", fire: "Fuego", 
            water: "Agua", grass: "Planta", electric: "Eléctrico", psychic: "Psíquico", 
            ice: "Hielo", dragon: "Dragón", dark: "Siniestro", fairy: "Hada"
        };

        async function startNewGame() {
            document.getElementById('word-grid').innerHTML = "Cargando...";
            document.getElementById('letters-box').innerHTML = "";
            document.getElementById('hint-text').innerText = "";
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('result-modal').style.display = 'none';
            wrongLetters = [];
            presentLetters.clear();

            const randomId = Math.floor(Math.random() * 1010) + 1;
            
            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${randomId}`);
                const data = await response.json();
                const speciesRes = await fetch(data.species.url);
                const speciesData = await speciesRes.json();
                
                let region = (randomId <= 151) ? "Kanto" : (randomId <= 251) ? "Johto" : (randomId <= 386) ? "Hoenn" : (randomId <= 493) ? "Sinnoh" : (randomId <= 649) ? "Teselia" : (randomId <= 721) ? "Kalos" : (randomId <= 809) ? "Alola" : (randomId <= 905) ? "Galar" : "Paldea";
                const desc = speciesData.flavor_text_entries.find(e => e.language.name === 'es')?.flavor_text || "Sin descripción.";
                
                pokemonData = {
                    name: data.name.split('-')[0].toLowerCase(),
                    img: data.sprites.other['official-artwork'].front_default,
                    desc: desc.replace(/\n|\f/g, ' '),
                    type: data.types.map(t => typeTranslations[t.type.name] || t.type.name).join(' / '),
                    region: region
                };

                targetName = pokemonData.name;
                revealedLetters = new Array(targetName.length).fill(null);
                renderBoard();
            } catch (e) { console.error(e); }
        }

        function renderBoard() {
            const container = document.getElementById('word-grid');
            container.innerHTML = "";
            
            for (let i = 0; i < targetName.length; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                
                if (revealedLetters[i]) {
                    tile.classList.add('correct');
                    tile.innerText = revealedLetters[i];
                } else if (presentLetters.has(targetName[i])) {
                    // Si esta letra específica ha sido intentada y está en la palabra pero NO aquí
                    tile.classList.add('present');
                }
                
                container.appendChild(tile);
            }
        }

        function checkLetter() {
            const input = document.getElementById('letter-input');
            const letter = input.value.toLowerCase().trim();
            input.value = "";
            input.focus();

            if (!letter || !/[a-z]/.test(letter)) return;

            if (targetName.includes(letter)) {
                let foundMatch = false;
                // Verificamos si la letra está en alguna posición que no ha sido revelada aún
                for (let i = 0; i < targetName.length; i++) {
                    if (targetName[i] === letter) {
                        // Si el usuario por casualidad la pega en su sitio (En este modo letra a letra, revelamos todas las posiciones correctas)
                        revealedLetters[i] = letter;
                        foundMatch = true;
                    }
                }
                
                // Lógica de "Amarillo": Si la letra existe pero no hemos completado todas sus posiciones
                // En este juego de letra única, el amarillo sirve para saber que esa letra "está" 
                // aunque no la hayamos asignado nosotros a un hueco (la IA lo hace por ti al acertar).
                // Para que sea más Wordle, si la letra está, se pone en verde. 
                // Si quieres que el amarillo funcione, el usuario debería elegir POSICIÓN y LETRA.
                // Como es tipo Ahorcado, vamos a marcar en AMARILLO las letras que el usuario 
                // ya sabe que están pero quizás hay más repeticiones.
                
                renderBoard();
                if (!revealedLetters.includes(null)) endGame(false);
            } else {
                if (!wrongLetters.includes(letter)) {
                    wrongLetters.push(letter);
                    updateDiscarded();
                }
            }
        }

        function updateDiscarded() {
            const list = document.getElementById('letters-box');
            list.innerHTML = "";
            wrongLetters.sort().forEach(l => {
                const div = document.createElement('div');
                div.className = 'key-absent';
                div.innerText = l.toUpperCase();
                list.appendChild(div);
            });
        }

        function getHint(type) {
            const hintBox = document.getElementById('hint-text');
            hintBox.innerText = (type === 'region') ? `REGIÓN: ${pokemonData.region}` : `TIPO: ${pokemonData.type}`;
        }

        function endGame(surrender) {
            document.getElementById('modal-title').innerText = surrender ? "¡TE HAS RENDIDO!" : "¡ADIVINADO!";
            document.getElementById('poke-img').src = pokemonData.img;
            document.getElementById('poke-name').innerText = pokemonData.name.toUpperCase();
            document.getElementById('poke-desc').innerText = pokemonData.desc;
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('result-modal').style.display = 'block';
        }

        document.getElementById('letter-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') checkLetter(); });

        startNewGame();
    </script>
</body>
</html>
