<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poké Ahorcado</title>
    <style>
        :root {
            --poke-blue: #3B4CCA;
            --poke-yellow: #FFCB05;
            --bg-dark: #121213;
            --tile-bg: #272729;
            --correct: #538d4e;
            --text-main: #ffffff;
            --border-soft: #3a3a3c;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background-color: var(--poke-blue);
            border-bottom: 4px solid var(--poke-yellow);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        h1 {
            margin: 0;
            font-size: 1.8rem;
            letter-spacing: 2px;
            color: var(--poke-yellow);
            text-transform: uppercase;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.3);
        }

        #game-container {
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Contador de Intentos */
        #attempts-counter {
            font-size: 0.9rem;
            color: var(--poke-yellow);
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        #word-grid {
            display: flex;
            gap: 8px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .tile {
            width: 45px;
            height: 45px;
            background: var(--tile-bg);
            border: 2px solid var(--border-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 4px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .tile.revealed {
            background-color: var(--correct);
            border-color: var(--correct);
            transform: translateY(-3px);
            box-shadow: 0 4px 0px #3e6a3a;
        }

        .hints {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .btn-hint {
            background: transparent;
            color: var(--poke-yellow);
            border: 2px solid var(--poke-yellow);
            padding: 6px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        #hint-display {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 20px;
            text-align: center;
            height: 1.2rem;
        }

        .input-area {
            display: flex;
            gap: 12px;
            margin-bottom: 15px;
        }

        #letter-input {
            width: 55px;
            height: 55px;
            font-size: 1.8rem;
            text-align: center;
            border: 2px solid var(--border-soft);
            background: #1e1e1f;
            color: white;
            border-radius: 8px;
            text-transform: uppercase;
            outline: none;
        }

        #letter-input:focus { border-color: var(--poke-yellow); }

        .btn-action {
            background: var(--poke-blue);
            color: white;
            border: 1px solid var(--poke-yellow);
            padding: 0 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-surrender {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            text-decoration: underline;
            font-size: 0.8rem;
            margin-bottom: 30px;
        }

        .discarded {
            width: 100%;
            text-align: center;
            border-top: 1px solid var(--border-soft);
            padding-top: 20px;
        }

        #letters-box {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .bad-letter {
            background: var(--border-soft);
            color: #777;
            width: 30px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-weight: bold;
        }

        /* Modal Resultado */
        #modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 10; }
        #result-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1e1e1f; padding: 30px; border-radius: 15px; z-index: 11; width: 85%; max-width: 400px; text-align: center;
            border: 2px solid var(--poke-yellow);
        }
        #result-modal img { width: 160px; margin-bottom: 10px; }
        #result-modal h2 { margin: 10px 0; color: var(--poke-yellow); text-transform: uppercase; font-size: 1.2rem; }
        #capture-text { color: var(--correct); font-weight: bold; font-size: 1.1rem; margin: 10px 0; }
        #poke-desc { color: #ccc; font-size: 0.85rem; line-height: 1.5; margin: 15px 0; text-align: justify; }
    </style>
</head>
<body>

    <header>
        <h1>Poké Ahorcado</h1>
    </header>

    <div id="game-container">
        <div id="attempts-counter">INTENTOS: 0</div>
        
        <div class="hints">
            <button class="btn-hint" onclick="getHint('region')">Región</button>
            <button class="btn-hint" onclick="getHint('type')">Tipo</button>
        </div>
        
        <div id="hint-display">Escribe una letra para investigar...</div>

        <div id="word-grid"></div>

        <div class="input-area">
            <input type="text" id="letter-input" maxlength="1" autocomplete="off" autofocus>
            <button class="btn-action" onclick="checkLetter()">Adivinar</button>
        </div>
        
        <button class="btn-surrender" onclick="endGame(true)">Rendirse</button>

        <div class="discarded">
            <div style="font-size: 0.65rem; color: #565758; letter-spacing: 2px; font-weight: bold;">RASTRO PERDIDO</div>
            <div id="letters-box"></div>
        </div>
    </div>

    <div id="modal-overlay"></div>
    <div id="result-modal">
        <h2 id="modal-title"></h2>
        <img id="poke-img" src="" alt="">
        <h3 id="poke-name" style="text-transform: uppercase; color: white; margin: 5px 0;"></h3>
        <div id="capture-text"></div>
        <p id="poke-desc"></p>
        <button class="btn-action" onclick="startNewGame()" style="width: 100%; height: 50px; background: var(--correct); border: none; margin-top: 10px;">Nueva Partida</button>
    </div>

    <script>
        let targetName = "";
        let revealedLetters = [];
        let wrongLetters = [];
        let attempts = 0;
        let pokemonData = null;

        const typeTranslations = {
            normal: "Normal", fighting: "Lucha", flying: "Volador", poison: "Veneno", ground: "Tierra", 
            rock: "Roca", bug: "Bicho", ghost: "Fantasma", steel: "Acero", fire: "Fuego", 
            water: "Agua", grass: "Planta", electric: "Eléctrico", psychic: "Psíquico", 
            ice: "Hielo", dragon: "Dragón", dark: "Siniestro", fairy: "Hada"
        };

        async function startNewGame() {
            attempts = 0;
            wrongLetters = [];
            document.getElementById('attempts-counter').innerText = "INTENTOS: 0";
            document.getElementById('word-grid').innerHTML = "...";
            document.getElementById('letters-box').innerHTML = "";
            document.getElementById('modal-overlay').style.display = 'none';
            document.getElementById('result-modal').style.display = 'none';
            document.getElementById('capture-text').innerText = "";

            const randomId = Math.floor(Math.random() * 1010) + 1;
            
            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${randomId}`);
                const data = await response.json();
                const speciesRes = await fetch(data.species.url);
                const speciesData = await speciesRes.json();
                
                let region = "Kanto";
                if (randomId > 151) region = "Johto";
                if (randomId > 251) region = "Hoenn";
                if (randomId > 386) region = "Sinnoh";
                if (randomId > 493) region = "Teselia";
                if (randomId > 649) region = "Kalos";
                if (randomId > 721) region = "Alola";
                if (randomId > 809) region = "Galar";
                if (randomId > 905) region = "Paldea";

                const desc = speciesData.flavor_text_entries.find(e => e.language.name === 'es')?.flavor_text || "Sin datos.";
                
                pokemonData = {
                    name: data.name.split('-')[0].toLowerCase(),
                    img: data.sprites.other['official-artwork'].front_default,
                    desc: desc.replace(/\n|\f/g, ' '),
                    type: data.types.map(t => typeTranslations[t.type.name] || t.type.name).join(' / '),
                    region: region
                };

                targetName = pokemonData.name;
                revealedLetters = new Array(targetName.length).fill(null);
                renderBoard();
            } catch (e) { console.error(e); }
        }

        function renderBoard() {
            const container = document.getElementById('word-grid');
            container.innerHTML = "";
            for (let i = 0; i < targetName.length; i++) {
                const tile = document.createElement('div');
                tile.className = 'tile' + (revealedLetters[i] ? ' revealed' : '');
                tile.innerText = revealedLetters[i] ? revealedLetters[i].toUpperCase() : "";
                container.appendChild(tile);
            }
        }

        function checkLetter() {
            const input = document.getElementById('letter-input');
            const letter = input.value.toLowerCase().trim();
            input.value = "";
            input.focus();

            if (!letter || !/[a-z]/.test(letter) || revealedLetters.includes(letter) || wrongLetters.includes(letter)) return;

            attempts++;
            document.getElementById('attempts-counter').innerText = `INTENTOS: ${attempts}`;

            if (targetName.includes(letter)) {
                for (let i = 0; i < targetName.length; i++) {
                    if (targetName[i] === letter) revealedLetters[i] = letter;
                }
                renderBoard();
                if (!revealedLetters.includes(null)) endGame(false);
            } else {
                wrongLetters.push(letter);
                updateDiscarded();
            }
        }

        function updateDiscarded() {
            const list = document.getElementById('letters-box');
            list.innerHTML = "";
            wrongLetters.sort().forEach(l => {
                const div = document.createElement('div');
                div.className = 'bad-letter';
                div.innerText = l.toUpperCase();
                list.appendChild(div);
            });
        }

        function getHint(type) {
            document.getElementById('hint-display').innerText = (type === 'region') ? 
                `Región: ${pokemonData.region}` : `Tipo: ${pokemonData.type}`;
        }

        function endGame(surrender) {
            document.getElementById('modal-title').innerText = surrender ? "EL POKÉMON ESCAPÓ" : "¡POKÉMON CAPTURADO!";
            if (!surrender) {
                document.getElementById('capture-text').innerText = `¡Pokémon capturado en ${attempts} intentos!`;
            }
            document.getElementById('poke-img').src = pokemonData.img;
            document.getElementById('poke-name').innerText = pokemonData.name.toUpperCase();
            document.getElementById('poke-desc').innerText = pokemonData.desc;
            document.getElementById('modal-overlay').style.display = 'block';
            document.getElementById('result-modal').style.display = 'block';
        }

        document.getElementById('letter-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkLetter();
        });

        startNewGame();
    </script>
</body>
</html>
